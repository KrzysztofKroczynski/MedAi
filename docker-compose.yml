services:

  neo4j:
    image: neo4j:5
    container_name: medgraph_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  setup:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-medgraph_pass}
    command: ["python", "-m", "graph.schema"]
    profiles:
      - setup   # run with: docker compose --profile setup run --rm setup

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    container_name: medgraph_ingest
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-medgraph_pass}
    volumes:
      - ./data/pdfs:/app/data/pdfs:ro
      - ./data/processed:/app/data/processed   # extraction results saved here
      - ./logs:/app/logs
    profiles:
      - ingest   # run with: docker compose --profile ingest run --rm ingest

  seed:
    build:
      context: .
      dockerfile: Dockerfile.ingest   # reuses same image
    container_name: medgraph_seed
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-medgraph_pass}
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./logs:/app/logs
    command: ["sh", "-c", "python graph/schema.py && python seed.py"]
    profiles:
      - seed   # run with: docker compose --profile seed run --rm seed

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: medgraph_app
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

volumes:
  neo4j_data:
  neo4j_logs:
