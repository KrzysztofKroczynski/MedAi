services:

  neo4j:
    image: neo4j:5
    container_name: medgraph_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-medgraph_pass}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - ./logs/neo4j:/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingest
    container_name: medgraph_ingest
    depends_on:
      neo4j:
        condition: service_healthy
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-medgraph_pass}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
    volumes:
      - ./data/pdfs:/app/data/pdfs:ro
      - ./data/processed:/app/data/processed
      - ./logs/ingest:/app/logs
    profiles: [ingest]

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      target: ingest
    container_name: medgraph_seed
    depends_on:
      neo4j:
        condition: service_healthy
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-medgraph_pass}
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./logs/seed:/app/logs
    command: ["python", "seed.py"]
    profiles: [seed]

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: medgraph_app
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-medgraph_pass}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      PDFS_DIR: /app/data/pdfs
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-20}
    volumes:
      - ./agent:/app/agent:ro
      - ./ingestion:/app/ingestion:ro
      - ./data:/app/data

volumes:
  neo4j_data:
