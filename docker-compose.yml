services:

  neo4j:
    image: neo4j:5
    container_name: medgraph_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    container_name: medgraph_ingest
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MODEL: ${MODEL}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-medgraph_pass}
    volumes:
      - ./data/pdfs:/app/data/pdfs:ro
      - ./data/processed:/app/data/processed
      - ./logs:/app/logs
    profiles:
      - full   # docker compose --profile full up

  seed:
    build:
      context: .
      dockerfile: Dockerfile.ingest   # reuses same image
    container_name: medgraph_seed
    depends_on:
      neo4j:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
        required: false   # skipped when running --profile seed (ingest not started)
    environment:
      PYTHONUNBUFFERED: "1"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-medgraph_pass}
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./logs:/app/logs
    command: ["python", "seed.py"]
    profiles:
      - seed   # docker compose --profile seed up
      - full   # docker compose --profile full up  (waits for ingest to finish)

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: medgraph_app
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MODEL: ${MODEL}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PDFS_DIR: /app/data/pdfs
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-20}
    volumes:
      - ./agent:/app/agent:ro
      - ./ingestion:/app/ingestion:ro
      - ./data:/app/data

volumes:
  neo4j_data:
  neo4j_logs:
